name: CI-CD

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and Test (${{ matrix.os }} / ${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
          - os: windows-latest
            compiler: msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan
        run: python -m pip install --upgrade pip conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Print CMake version
        run: cmake --version

      - name: Configure compiler (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "CC=${{ matrix.cc }}" >> $GITHUB_ENV
          echo "CXX=${{ matrix.cxx }}" >> $GITHUB_ENV

      - name: Conan install
        run: conan install . --build=missing -s build_type=Release

      - name: CMake configure
        run: cmake --preset conan-release

      - name: CMake build
        run: cmake --build --preset conan-release

      - name: CTest
        run: ctest --preset conan-release --output-on-failure -V

  lint:
    name: Lint (clang-format and clang-tidy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan
        run: python -m pip install --upgrade pip conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Print CMake version
        run: cmake --version

      - name: Conan install
        run: conan install . --build=missing -s build_type=Release

      - name: CMake configure
        run: cmake --preset conan-release

      - name: Ensure scripts are executable
        run: chmod +x scripts/*.sh

      - name: Run clang-format check
        run: cmake --build --preset conan-release --target lint

      - name: Run clang-tidy
        run: cmake --build --preset conan-release --target clang-tidy

  install-package:
    name: Install and Package (${{ matrix.os }} / ${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    needs: [build-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
            archive_ext: tar.gz
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
            archive_ext: tar.gz
          - os: windows-latest
            compiler: msvc
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan
        run: python -m pip install --upgrade pip conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Print CMake version
        run: cmake --version

      - name: Configure compiler (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "CC=${{ matrix.cc }}" >> $GITHUB_ENV
          echo "CXX=${{ matrix.cxx }}" >> $GITHUB_ENV

      - name: Conan install
        run: conan install . --build=missing -s build_type=Release

      - name: CMake configure
        run: cmake --preset conan-release

      - name: CMake build
        run: cmake --build --preset conan-release

      - name: CMake install
        run: cmake --install build --prefix install

      - name: Archive install tree (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf challenge-${{ runner.os }}-${{ matrix.compiler }}.${{ matrix.archive_ext }} -C install .

      - name: Archive install tree (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path install\* -DestinationPath challenge-${{ runner.os }}-${{ matrix.compiler }}.${{ matrix.archive_ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: install-${{ runner.os }}-${{ matrix.compiler }}
          path: challenge-${{ runner.os }}-${{ matrix.compiler }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [install-package]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download install artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Show downloaded artifacts
        run: find release-artifacts -type f | sort

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.zip
          fail_on_unmatched_files: true
